<!doctype html>
<html>
  <body>
    <head>
      <title>Rock Paper Scissors</title>
    </head>
    <center>
      <p>Rock Paper Scissor</p>
      <button onclick="PlayGame('rock')">Rock</button>
      <button onclick="PlayGame('paper')">Paper</button>
      <button onclick="PlayGame('scissors')">Scissors</button>
      <button
        onclick="
          score.wins = 0;
          score.losses = 0;
          score.ties = 0;
        "
      >
        Reset score
      </button>
      <script>
        const score = {
          wins: 0,
          losses: 0,
          ties: 0,
        };
        function radomComputerMove() {
          let computerMove = "";
          const radomNumber = Math.random();
          if (radomNumber >= 0 && radomNumber < 1 / 3) {
            computerMove = "rock";
          } else if (radomNumber > 1 / 3 && radomNumber < 2 / 3) {
            computerMove = "paper";
          } else if (radomNumber > 2 / 3 && radomNumber < 1) {
            computerMove = "scissors";
          }

          return computerMove;
        }

        function PlayGame(playerMove) {
          let computerMove = radomComputerMove();
          let result = "";

          if (playerMove === "scissors") {
            if (computerMove === "rock") {
              result = "you lose";
            } else if (computerMove === "paper") {
              result = "You win";
            } else if (computerMove === "scissors") {
              result = "Tie";
            }
          } else if (playerMove === "rock") {
            if (computerMove === "rock") {
              result = "You win";
            } else if (computerMove === "paper") {
              result = "You win";
            } else if (computerMove === "scissors") {
              result = "Tie";
            }
          } else if (playerMove === "paper") {
            if (computerMove === "rock") {
              result = "you lose";
            } else if (computerMove === "paper") {
              result = "You win";
            } else if (computerMove === "scissors") {
              result = "Tie";
            }
          }
          if (result === "you win") {
            score.wins += 1;
          } else if (result === "you lose") {
            score.losses += 1;
          } else if (result === "Tie") {
            score.ties += 1;
          }

          alert(
            `You picked rock picked ${computerMove} ${result} 
            Wins: ${score.wins}, losses: ${score.losses},
            Ties: ${score.ties}`,
          );

          return result;
        }
      </script>
    </center>
  </body>
</html>
