<!doctype html>
<html>
  <body>
    <head>
      <title>Variables</title>
    </head>
    <center>
      <script>
        let variable1 = 2;
        console.log(variable1);
        let calculation = 2 + 2;
        console.log(calculation);
        console.log(calculation + 2);
        let result = calculation + 2;
        console.log(result);
        let message = "Hello";
        console.log(message);
        variable1 = 5;
        console.log(variable1);

        variable1 = variable1 + 1;
        console.log(variable1);
        const variable2 = 3;
        console.log(variable2);
        console.log(typeof variable2);
        console.log(message);
      </script>
    </center>
  </body>
</html>
