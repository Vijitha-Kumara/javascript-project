<!doctype html>
<html>
  <body>
    <head>
      <title>Cart Quantity</title>
    </head>
    <center>
      <button onclick="console.log(`Cart Quantity : ${cartQuantity}`)">
        Show Quantity
      </button>
      <button
        onclick="
          cartQuantity++;
          console.log(`Cart Quantity : ${cartQuantity}`);
        "
      >
        Add Cart
      </button>
      <button
        onclick="
          cartQuantity += 2;
          console.log(`Cart Quantity : ${cartQuantity}`);
        "
      >
        +2
      </button>
      <button
        onclick="
          cartQuantity += 3;
          console.log(`Cart Quantity : ${cartQuantity}`);
        "
      >
        +3
      </button>
      <button
        onclick="
          {
            cartQuantity = 0;
            console.log('cart is reset.');
            console.log(`Cart Quantity : ${cartQuantity}`);
          }
        "
      >
        Reset
      </button>
      <script>
        let cartQuantity = 0;
      </script>
    </center>
  </body>
</html>
